{% extends "base.html" %}

{% block content %}
<article>
    <header>
        <h1>{{ title }}</h1>
        <div class="meta">
            {% if date %}<time datetime="{{ date }}">{{ date }}</time>{% endif %}
            {% if author %}<span class="author">by {{ author }}</span>{% endif %}
        </div>
        {% if tags %}
        <ul class="tags">
            {% for tag in tags %}<li>{{ tag }}</li>{% endfor %}
        </ul>
        {% endif %}
    </header>
    {{ content | safe }}
</article>
{% endblock %}
