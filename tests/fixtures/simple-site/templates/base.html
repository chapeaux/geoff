<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ title }}{% endblock %} — {{ config.title }}</title>
    {% if description %}<meta name="description" content="{{ description }}">{% endif %}
    {% if json_ld %}
    <script type="application/ld+json">
    {{ json_ld | safe }}
    </script>
    {% endif %}
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="/">{{ config.title }}</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Built with Geoff.</p>
    </footer>
</body>
</html>
