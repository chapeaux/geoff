name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p chapeaux-geoff

      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/geoff
          else
            strip target/${{ matrix.target }}/release/geoff
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/geoff staging/
          cp LICENSE staging/
          cp README.md staging/ || true
          cd staging
          tar czf ../geoff-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          cd ..
          sha256sum geoff-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > geoff-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/geoff.exe" staging/
          Copy-Item "LICENSE" staging/
          if (Test-Path "README.md") { Copy-Item "README.md" staging/ }
          Compress-Archive -Path staging/* -DestinationPath "geoff-${{ github.ref_name }}-${{ matrix.target }}.zip"
          (Get-FileHash "geoff-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  geoff-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "geoff-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: geoff-${{ matrix.target }}
          path: |
            geoff-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: geoff-*
          generate_release_notes: true

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Update all version strings in all Cargo.toml files
          find . -name Cargo.toml -exec sed -i "s/\"0\.[0-9]*\.[0-9]*\"/\"$VERSION\"/g" {} \;

      - name: Publish geoff-core
        run: cargo publish -p geoff-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-core to propagate
        run: sleep 30

      - name: Publish geoff-graph
        run: cargo publish -p geoff-graph --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-graph to propagate
        run: sleep 30

      - name: Publish geoff-content
        run: cargo publish -p geoff-content --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-content to propagate
        run: sleep 30

      - name: Publish geoff-ontology
        run: cargo publish -p geoff-ontology --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-ontology to propagate
        run: sleep 30

      - name: Publish geoff-render
        run: cargo publish -p geoff-render --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-render to propagate
        run: sleep 30

      - name: Publish geoff-plugin
        run: cargo publish -p geoff-plugin --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-plugin to propagate
        run: sleep 30

      - name: Publish geoff-deno
        run: cargo publish -p geoff-deno --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-deno to propagate
        run: sleep 30

      - name: Publish geoff-server
        run: cargo publish -p geoff-server --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
        continue-on-error: true

      - name: Wait for geoff-server to propagate
        run: sleep 30

      - name: Publish geoff-cli (chapeaux-geoff)
        run: cargo publish -p chapeaux-geoff --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty
